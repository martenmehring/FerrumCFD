name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RUST_TOOLCHAIN: 1.94.0

jobs:
  rust-quality:
    name: Rust quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" \
            --profile minimal \
            --component rustfmt \
            --component clippy \
            --no-self-update

      - name: Check formatting
        run: cargo +$RUST_TOOLCHAIN fmt --all -- --check

      - name: Fetch locked dependencies
        run: cargo +$RUST_TOOLCHAIN fetch --locked

      - name: Run Clippy
        run: cargo +$RUST_TOOLCHAIN clippy --workspace --all-targets --locked --offline -- -D warnings

      - name: Run workspace tests
        run: cargo +$RUST_TOOLCHAIN test --workspace --locked --offline
